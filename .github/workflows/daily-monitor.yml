name: Daily GitHub Monitor

on:
  schedule:
    # 每天 UTC 06:00 执行（北京时间 14:00）
    - cron: '0 6 * * *'
  workflow_dispatch:
    # 支持手动触发
    inputs:
      force_full_scan:
        description: 'Force full scan (ignore cache)'
        required: false
        default: 'false'

env:
  # 监控配置
  STAR_THRESHOLD: 50
  EXTRA_REPOS: 'sonic-net/sonic-platform-daemons'
  DINGTALK_FOLDER: 'gwva2dxOW4vRkd9DUBnEx5ZoJbkz3BRL'
  
jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          pip install requests
          
      - name: Run GitHub Monitor
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          XIAOQ_API_KEY: ${{ secrets.XIAOQ_API_KEY }}
        run: |
          python scripts/github_monitor.py
          
      - name: Upload cache
        uses: actions/upload-artifact@v4
        with:
          name: monitor-cache
          path: cache/
          retention-days: 7
          
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: daily-report
          path: reports/
          retention-days: 30
